# ExternalSecret: sync the envdocs OIDC client secret + oauth2-proxy cookie
# secret from AWS Secrets Manager into the envdocs namespace.
#
# The ASM secret usgov-coderdemo/envdocs/oauth is a JSON object with keys
# `client-secret` and `cookie-secret`, created/updated by
# scripts/setup-envdocs.py (mirroring scripts/setup-grafana-oidc.py). ESO
# extracts those JSON keys verbatim into the Kubernetes Secret `envdocs-oauth`,
# which oauth2-proxy reads via secretKeyRef. No secret material is in git.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: envdocs-oauth
  namespace: envdocs
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/part-of: usgov-coderdemo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: envdocs-oauth
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: usgov-coderdemo/envdocs/oauth

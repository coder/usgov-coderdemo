# Helm values for the kiali/kiali-server chart 2.26.0 (Kiali server v2.26.0).
#
# Kiali is the Istio mesh observability console: a live service graph with
# per-edge mTLS padlock badges, traffic rates, and links into the Istio Grafana
# dashboards. v2.26 is the Kiali line that Istio 1.30 certifies (the istio-1.30.1
# Kiali addon ships quay.io/kiali/kiali:v2.26 and labels it v2.26.0).
#
# This deploys the Kiali SERVER only (no Kiali operator). The chart renders a
# ServiceAccount, ClusterRole/Binding, ConfigMap, Deployment, and Service. The
# rendered manifest is committed next to this file as kiali.yaml; regenerate it
# with:
#   helm template kiali kiali/kiali-server --version 2.26.0 \
#     --namespace istio-system \
#     -f deploy/istio/observability/kiali-server-values.yaml \
#     > deploy/istio/observability/kiali.yaml
#
# Air-gapped: the only container image is overridden to the private ECR mirror
# (scripts/images.txt -> quay/kiali/kiali:v2.26.0). Helm renders the chart
# client-side, so the cluster never pulls the chart, only the ECR image.
deployment:
  # Pull the server image from the private ECR mirror, not quay.io.
  image_name: 430737322961.dkr.ecr.us-gov-west-1.amazonaws.com/quay/kiali/kiali
  image_version: v2.26.0
  # Tags are mirrored immutably, so prefer the cached image on the node.
  image_pull_policy: IfNotPresent
  # Single demo replica; read the whole cluster for the mesh graph.
  replicas: 1
  cluster_wide_access: true
  # Kiali is reached through the Istio ingress gateway VirtualService
  # (virtualservice-kiali.yaml), not a Kubernetes Ingress.
  ingress_enabled: false
  # Keep Kiali out of the mesh data plane; istio-system is not injected.
  pod_labels:
    sidecar.istio.io/inject: "false"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 1Gi

# Demo auth: anonymous. PRODUCTION FOLLOW-UP: switch auth.strategy to "openid"
# and wire Kiali to the same Keycloak realm ("coder") that fronts Grafana and
# Coder (see scripts/setup-grafana-oidc.py for the pattern). Not a blocker for
# the demo; tracked separately.
auth:
  strategy: anonymous

external_services:
  # Istio control-plane (istiod) lives in istio-system.
  istio:
    root_namespace: istio-system
  # In-cluster Prometheus from the kube-prometheus-stack release "kps".
  prometheus:
    url: http://kps-kube-prometheus-stack-prometheus.monitoring.svc:9090
  # Link Kiali metric panels and "View in Grafana" actions to the same Grafana.
  # internal_url is used server-side by Kiali to query Grafana; external_url is
  # the browser-facing link rendered in the UI.
  grafana:
    enabled: true
    internal_url: http://kps-grafana.monitoring.svc:80
    external_url: https://grafana.usgov.coderdemo.io
  # No tracing backend wired for the demo (Tempo/Jaeger is a later add).
  tracing:
    enabled: false

server:
  port: 20001
  # Serve under /kiali so the gateway host exposes https://<host>/kiali.
  web_root: /kiali

          "description": "Per-session rollup from the Coder database: session ID, user, interception count, models used, first and last seen, tokens, and estimated cost.",
          "datasource": {
            "type": "postgres",
            "uid": "aibridge-postgres"
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 64
          },
          "targets": [
            {
              "datasource": {
                "type": "postgres",
                "uid": "aibridge-postgres"
              },
              "editorMode": "code",
              "rawQuery": true,
              "rawSql": "SELECT i.session_id AS \"Session ID\", max(u.username) AS \"User\", count(DISTINCT i.id) AS \"Interceptions\", string_agg(DISTINCT i.model, ', ') AS \"Models\", min(i.started_at) AS \"First Seen\", max(COALESCE(i.ended_at, i.started_at)) AS \"Last Seen\", COALESCE(SUM(tu.input_tokens),0) AS \"Input Tokens\", COALESCE(SUM(tu.output_tokens),0) AS \"Output Tokens\", ROUND(COALESCE(SUM((COALESCE(tu.input_tokens,0)*COALESCE(p.input_price,0) + COALESCE(tu.output_tokens,0)*COALESCE(p.output_price,0) + COALESCE(tu.cache_read_input_tokens,0)*COALESCE(p.cache_read_price,0) + COALESCE(tu.cache_write_input_tokens,0)*COALESCE(p.cache_write_price,0))),0)::numeric/1e12, 4) AS \"Cost (USD)\" FROM aibridge_interceptions i LEFT JOIN users u ON u.id = i.initiator_id LEFT JOIN aibridge_token_usages tu ON tu.interception_id = i.id LEFT JOIN ai_model_prices p ON p.provider = i.provider AND p.model = i.model WHERE $__timeFilter(i.started_at) GROUP BY i.session_id ORDER BY \"Last Seen\" DESC LIMIT 200",
              "format": "table",
              "refId": "A"
            }
          ],
          "transformations": [],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": {
                  "type": "auto"
                },
                "filterable": true
              }
            },
            "overrides": []
          },
          "options": {
            "showHeader": true,

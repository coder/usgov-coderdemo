# Agent Firewall Grafana dashboard (Coder AI Governance add-on).
#
# Swap-in of the upstream coder/observability boundary dashboard, adapted to this
# stack and split from the combined AI Governance dashboard. Display terminology
# is product-facing ("Agent Firewall"); underlying identifiers are unchanged, so
# PromQL still references agent_boundary_*, LogQL still matches the literal log
# text "boundary" / "boundary_request", and the Coder database keeps its
# boundary_* table names.
#
# Upstream provenance:
#   repo  coder/observability
#   SHA   863d498843f86d5ac07cf9b3eb2bb27ecdda706a (tag v0.7.1)
#   file  coder-observability/templates/dashboards/_dashboards_boundary.json.tpl
#         (dashboard uid "agent-boundaries", title "Coder Agent Boundaries")
#
# Adaptations for this stack (display-only renames plus datasource wiring):
#   - Loki stream selector: upstream selects {..., logger=`coderd.agentrpc`}, but
#     promtail here exposes only app/namespace/pod/container/node_name labels (no
#     logger label). Replaced with namespace=~`(coder|coder-workspaces)` plus the
#     `boundary_request` line filter, matching the proven pattern already used by
#     the in-repo Agent Firewall log panels. The logger value is not a stream
#     label here; the boundary_request line filter is the reliable narrow.
#   - Helm template includes resolved to literals (non-workspace-selector,
#     dashboard-range, dashboard-refresh) since this is rendered JSON, not a chart.
#   - The upstream allow/deny audit panels need live audited egress to populate;
#     boundary_request events are not emitted in this stack yet (placeholder AI
#     key, no audited egress, older Coder). They are correct, not broken.
#   - Operations row (batch counters, active agents, sessions, proxy log stream)
#     is retained from the in-repo dashboard so the view has populated panels
#     today: Prometheus (agent_boundary_*) and Loki proxy lifecycle have data;
#     boundary_sessions (Postgres) reads 0 until sessions are recorded.
#
# Data sources: prometheus (uid prometheus), loki (uid loki), aibridge-postgres
# (uid aibridge-postgres, READ-ONLY grafana_ro). The Grafana sidecar imports any
# ConfigMap labelled grafana_dashboard: "1".
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coder-dashboard-boundary
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: usgov-coderdemo
    app.kubernetes.io/component: grafana-dashboard

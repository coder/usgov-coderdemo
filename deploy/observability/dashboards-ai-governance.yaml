# AI Governance Grafana dashboard (Coder AI Governance add-on).
#
# A single merged dashboard (uid ai-governance) that covers BOTH halves of the
# Coder AI Governance add-on:
#   - AI Gateway, implemented in Coder as AI Bridge (aibridged). Panels read the
#     coder_aibridged_* Prometheus series (configured providers and provider
#     reload health) and stream AI Bridge logs from Loki (namespace coder).
#   - Agent Firewall, implemented in Coder as Boundary. Panels read the
#     agent_boundary_log_proxy_batches_forwarded_total Prometheus counter and
#     stream Boundary logs from Loki (namespace coder-workspaces).
#
# The Grafana sidecar imports any ConfigMap labelled grafana_dashboard: "1", so
# this lives in the monitoring namespace next to Grafana. Every panel points at
# datasource uid prometheus or uid loki, both provisioned by the
# kube-prometheus-stack Grafana (loki via deploy/observability/loki-datasource.yaml).
#
# The live Anthropic key is a placeholder, so real AI calls fail and AI/agent
# traffic is minimal. Usage panels therefore read 0 or stay sparse; that is
# expected. Every panel still targets a real series or log query and returns a
# clean result rather than a datasource error.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coder-dashboard-ai-governance
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: usgov-coderdemo
    app.kubernetes.io/component: grafana-dashboard
data:
  ai-governance.json: |-
    {
      "uid": "ai-governance",
      "title": "AI Governance",
      "description": "Coder AI Governance add-on: merged view of the AI Gateway (AI Bridge) and the Agent Firewall (Boundary).",
      "tags": [
        "coder",
        "ai-governance"
      ],
      "style": "dark",
      "timezone": "",
      "editable": true,
      "graphTooltip": 0,
      "fiscalYearStartMonth": 0,
      "weekStart": "",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "1m",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "annotations": {
        "list": []
      },
      "templating": {
        "list": []
      },
      "links": [],
      "panels": [
        {
          "id": 1,
          "type": "text",
          "title": "AI Governance (AI Gateway + Agent Firewall)",
          "datasource": null,
          "gridPos": {
            "h": 4,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "options": {
            "mode": "markdown",
            "content": "This is the Coder AI Governance view, covering the AI Gateway (AI Bridge) and the Agent Firewall (Boundary). AI Gateway panels show configured providers and reload health from Prometheus, plus the AI Bridge log stream from Loki. Agent Firewall panels show forwarded Boundary batches from Prometheus, plus the Boundary log stream from Loki. Traffic dependent panels populate as AI and agent activity occurs, so they can legitimately read 0 or stay sparse until live usage happens."
          }
        },
        {
          "id": 2,
          "type": "row",
          "title": "AI Gateway (AI Bridge)",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 4
          },
          "panels": []
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Configured Providers",
          "description": "Number of AI providers configured in the AI Gateway (AI Bridge), from coder_aibridged_provider_info. Expected to be 2 in this demo (anthropic and anthropic-bedrock).",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 6,
            "w": 5,
            "x": 0,
            "y": 5
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "count(coder_aibridged_provider_info) or vector(0)",
              "refId": "A",
              "instant": true,
              "range": false,
              "format": "time_series"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Provider Reload Status",
          "description": "Whether the AI Bridge most recent provider config reload succeeded. Healthy means the last reload attempt matched the last successful reload (no failed reload in between). Compares coder_aibridged_providers_last_reload_timestamp_seconds with the success variant.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 6,
            "w": 5,
            "x": 5,
            "y": 5
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "coder_aibridged_providers_last_reload_timestamp_seconds == bool coder_aibridged_providers_last_reload_success_timestamp_seconds",
              "refId": "A",
              "instant": true,
              "range": false,
              "format": "time_series"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "1": {
                      "text": "Healthy",
                      "color": "green",
                      "index": 0
                    },
                    "0": {
                      "text": "Reload Failed",
                      "color": "red",
                      "index": 1
                    }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Last Successful Reload",
          "description": "Time of the AI Bridge last successful provider reload, shown relative to now. It updates only when providers reload (startup or config change), so an older value reflects a stable provider configuration, not an error.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 6,
            "w": 5,
            "x": 10,
            "y": 5
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "coder_aibridged_providers_last_reload_success_timestamp_seconds * 1000",
              "refId": "A",
              "instant": true,
              "range": false,
              "format": "time_series"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "dateTimeFromNow",
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "none",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "id": 6,
          "type": "table",
          "title": "Provider Inventory",
          "description": "Inventory of AI Gateway providers from coder_aibridged_provider_info: provider name, type, and enabled status.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 6,
            "w": 9,
            "x": 15,
            "y": 5
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "coder_aibridged_provider_info",
              "refId": "A",
              "instant": true,
              "range": false,
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "Value": true,
                  "container": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "namespace": true,
                  "pod": true,
                  "service": true
                },
                "renameByName": {
                  "provider_name": "Provider",
                  "provider_type": "Type",
                  "status": "Status"
                },
                "indexByName": {
                  "provider_name": 0,
                  "provider_type": 1,
                  "status": 2
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": {
                  "type": "auto"
                },
                "filterable": true
              }
            },
            "overrides": []
          },
          "options": {
            "showHeader": true,
            "cellHeight": "sm"
          }
        },
        {
          "id": 7,
          "type": "logs",
          "title": "AI Bridge Log Stream",
          "description": "Live AI Bridge (AI Gateway) log stream from Loki, namespace coder. Volume depends on AI usage; expect lifecycle lines such as provider pool reloads when AI traffic is low.",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 9,
            "w": 16,
            "x": 0,
            "y": 11
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "editorMode": "code",
              "expr": "{namespace=\"coder\"} |~ \"aibridged\"",
              "refId": "A",
              "queryType": "range"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "AI Bridge Log Event Rate",
          "description": "Count of AI Bridge log events in 5m windows from Loki. Indicates AI Gateway activity over time; flat or absent when there is no AI traffic.",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 9,
            "w": 8,
            "x": 16,
            "y": 11
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "editorMode": "code",
              "expr": "sum(count_over_time({namespace=\"coder\"} |~ \"aibridged\" [5m]))",
              "refId": "A",
              "queryType": "range",
              "legendFormat": "aibridged events"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 1,
                "fillOpacity": 10,
                "showPoints": "auto",
                "spanNulls": false,
                "axisPlacement": "auto"
              },
              "color": {
                "mode": "palette-classic"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 9,
          "type": "row",
          "title": "Agent Firewall (Boundary)",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 20
          },
          "panels": []
        },
        {
          "id": 10,
          "type": "stat",
          "title": "Total Boundary Batches Forwarded",
          "description": "Total Boundary (Agent Firewall) log proxy batches forwarded, summed across workspaces, from agent_boundary_log_proxy_batches_forwarded_total. Increments as agents forward boundary egress logs; reads 0 until agent activity occurs.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 6,
            "w": 6,
            "x": 0,
            "y": 21
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "sum(agent_boundary_log_proxy_batches_forwarded_total) or vector(0)",
              "refId": "A",
              "instant": true,
              "range": false,
              "format": "time_series"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Forwarded Boundary Batches by Workspace",
          "description": "Per workspace rate of Boundary batches forwarded (5m), from agent_boundary_log_proxy_batches_forwarded_total. Each line is a workspace and user. Stays at 0 until the agent firewall forwards egress logs.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 6,
            "w": 18,
            "x": 6,
            "y": 21
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "sum by (workspace_name, username) (rate(agent_boundary_log_proxy_batches_forwarded_total[5m]))",
              "refId": "A",
              "instant": false,
              "range": true,
              "format": "time_series",
              "legendFormat": "{{workspace_name}} / {{username}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineWidth": 1,
                "fillOpacity": 10,
                "showPoints": "auto",
                "spanNulls": false,
                "axisPlacement": "auto"
              },
              "color": {
                "mode": "palette-classic"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 12,
          "type": "table",
          "title": "Active Boundary Agents",
          "description": "Boundary agents currently exporting metrics, grouped by workspace, user, template, and agent, with total batches forwarded.",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 7,
            "w": 10,
            "x": 0,
            "y": 27
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "editorMode": "code",
              "expr": "agent_boundary_log_proxy_batches_forwarded_total",
              "refId": "A",
              "instant": true,
              "range": false,
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "container": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "namespace": true,
                  "pod": true,
                  "service": true
                },
                "renameByName": {
                  "workspace_name": "Workspace",
                  "username": "User",
                  "template_name": "Template",
                  "agent_name": "Agent",
                  "Value": "Batches"
                },
                "indexByName": {
                  "workspace_name": 0,
                  "username": 1,
                  "template_name": 2,
                  "agent_name": 3,
                  "Value": 4
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": {
                  "type": "auto"
                },
                "filterable": true
              }
            },
            "overrides": []
          },
          "options": {
            "showHeader": true,
            "cellHeight": "sm"
          }
        },
        {
          "id": 13,
          "type": "logs",
          "title": "Boundary Log Stream",
          "description": "Live Boundary (Agent Firewall) log stream from Loki, namespace coder-workspaces. Currently proxy lifecycle and debug lines; allow and deny egress events appear here as AI traffic grows.",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": {
            "h": 7,
            "w": 14,
            "x": 10,
            "y": 27
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "editorMode": "code",
              "expr": "{namespace=\"coder-workspaces\"} |= \"boundary\"",
              "refId": "A",
              "queryType": "range"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          }
        }
      ]
    }

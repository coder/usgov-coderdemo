apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: coder-demo-mcp

resources:
  - namespace.yaml
  - demo-db.yaml
  - mcp-server.yaml
  - externalsecrets.yaml

# The demo Postgres holds UNCLASSIFIED synthetic data and is not reachable
# outside the cluster. Its credentials are NOT stored in git: they live in AWS
# Secrets Manager (usgov-coderdemo/datastore-mcp/db) and are synced into the
# demo-db-secret and datastore-mcp-secret Kubernetes Secrets by ESO (see
# externalsecrets.yaml). seed.sql creates the mcp_ro role with no literal
# password; zz-set-mcp-ro-password.sh then sets it from the synced secret.
configMapGenerator:
  - name: demo-db-seed
    files:
      - seed.sql
      - zz-set-mcp-ro-password.sh

generatorOptions:
  disableNameSuffixHash: true

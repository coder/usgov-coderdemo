# ExternalSecrets: sync the synthetic demo-db credentials from AWS Secrets
# Manager (usgov-coderdemo/datastore-mcp/db) into the Kubernetes Secrets the
# datastore MCP and demo Postgres already consume. ASM is the source of truth;
# no credential literal lives in git. ESO authenticates to ASM via the
# controller's IRSA ServiceAccount (same ClusterSecretStore the rest of the
# stack uses). Mirrors deploy/platform/external-secrets.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: demo-db-secret
  namespace: coder-demo-mcp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: demo-db-secret
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: usgov-coderdemo/datastore-mcp/db
        property: POSTGRES_PASSWORD
    - secretKey: MCP_RO_PASSWORD
      remoteRef:
        key: usgov-coderdemo/datastore-mcp/db
        property: MCP_RO_PASSWORD
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: datastore-mcp-secret
  namespace: coder-demo-mcp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: datastore-mcp-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URI
      remoteRef:
        key: usgov-coderdemo/datastore-mcp/db
        property: DATABASE_URI

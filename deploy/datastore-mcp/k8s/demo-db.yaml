# Synthetic, UNCLASSIFIED demo Postgres for the AI Workspace MCP demo.
# Data is ephemeral (emptyDir) and reseeded on every pod start from the
# demo-db-seed ConfigMap. Not exposed outside the cluster (ClusterIP).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-db
  labels:
    app: demo-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: demo-db
    spec:
      containers:
        - name: postgres
          image: "430737322961.dkr.ecr.us-gov-west-1.amazonaws.com/docker-hub/library/postgres:18-alpine"
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: "demo"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-db-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: seed
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U postgres -d demo"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: seed
          configMap:
            name: demo-db-seed
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: demo-db
spec:
  selector:
    app: demo-db
  ports:
    - port: 5432
      targetPort: 5432

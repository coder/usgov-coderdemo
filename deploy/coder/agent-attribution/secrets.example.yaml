# Placeholder showing the shape of the secret the bridge consumes. The real
# values live ONLY in AWS Secrets Manager (synced by externalsecret.yaml via
# ESO). Never commit real secret material; this file documents the schema.
#
# ASM secret id: usgov-coderdemo/agent-attribution/bridge
# SecretString: a JSON object with these three keys.
#
# {
#   "coder-token":    "<coder-task-bot service-account token>",
#   "webhook-secret": "<random shared secret, also set on the GitLab webhook>",
#   "gitlab-pat":     "<glpat- admin token, used only for the issue comment back>"
# }
#
# Populate it (operator, never echoing values) for example with:
#   aws secretsmanager create-secret --region us-gov-west-1 \
#     --name usgov-coderdemo/agent-attribution/bridge \
#     --secret-string file:///path/to/bridge.json
#
# Rotate the same way with put-secret-value. ESO resyncs within refreshInterval.
apiVersion: v1
kind: Secret
metadata:
  name: agent-attribution-bridge
  namespace: coder
type: Opaque
stringData:
  coder-token: "REPLACED_BY_ESO_FROM_ASM"
  webhook-secret: "REPLACED_BY_ESO_FROM_ASM"
  gitlab-pat: "REPLACED_BY_ESO_FROM_ASM"

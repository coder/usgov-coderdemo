# ExternalSecret: sync the GitLab to Coder bridge credentials from AWS
# Secrets Manager into the `coder` namespace.
#
# The ASM secret usgov-coderdemo/agent-attribution/bridge is a JSON object with
# keys `coder-token` (the coder-task-bot service-account token), `webhook-secret`
# (the GitLab X-Gitlab-Token shared secret), and `gitlab-pat` (an admin PAT used
# to read the issue body and post the comment back). ESO extracts those keys
# verbatim into the Kubernetes Secret `agent-attribution-bridge`, which the
# bridge Deployment reads via secretKeyRef. No secret material is in git; see
# secrets.example.yaml for the shape and the population commands in README.md.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agent-attribution-bridge
  namespace: coder
  labels:
    app.kubernetes.io/name: agent-attribution-bridge
    app.kubernetes.io/part-of: usgov-coderdemo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: agent-attribution-bridge
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: usgov-coderdemo/agent-attribution/bridge

# Secret scanning with gitleaks.
#
# Runs on every pull request and on pushes to main. The scanner uses the
# repo-root .gitleaks.toml configuration. Real secrets live in AWS Secrets
# Manager and are synced by ESO; nothing secret should ever reach git.
#
# We invoke the gitleaks OSS binary directly rather than
# gitleaks/gitleaks-action@v2. That action refuses to run for GitHub
# organizations without a paid GITLEAKS_LICENSE, while the gitleaks CLI
# itself is MIT-licensed and free. Scanning the checked-out tree (gitleaks
# dir) is the meaningful backstop for a pull request: it fails when the
# resulting tree contains a secret. The pre-commit hook covers per-commit
# scanning locally.
name: secret-scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          version=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: gitleaks dir . --config .gitleaks.toml --redact --verbose

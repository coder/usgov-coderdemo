# Secret scanning with gitleaks.
#
# Runs on every pull request and on pushes to main. The scanner uses the
# repo-root .gitleaks.toml configuration. Real secrets live in AWS Secrets
# Manager and are synced by ESO; nothing secret should ever reach git.
name: secret-scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan all commits in a PR or push.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Single repo, so no Organization license key is required.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
